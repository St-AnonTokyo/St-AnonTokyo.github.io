    <h1>抛锚的云の个人空间</h1>
    <img src="images/Cloud0.png" alt="Anchored Cloud" />
    <p>这是一朵云，由天空的水汽和灰尘凝结而成。它没有家，它的生命没有一个确切的起点，只有轻飘飘的身体，托着事实与幻想凝成的水滴。你要是想打听远方的事，大可站在云下，等待微风或重力把一两滴雨点送入你的怀中。不必担心它轻盈的本性会使她随风飘去，因为有一根铁锚将它连向大地。</p>
    <p>不知是幸还是不幸，它的一切都被锚定在这棵小小的树上。它不会飞得太远、太高，被狂风打散，却也无法再成为天空的一部分。</p>
    <p>无论如何，这朵贴近大地的云会一直在这里，同你倾诉，直至水汽蒸发殆尽、尘埃落回大地。</p>
